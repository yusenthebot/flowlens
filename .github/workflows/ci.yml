# FlowLens CI Workflow
#
# Status badge (add to README.md):
# [![CI](https://github.com/niceyusen/flowlens/actions/workflows/ci.yml/badge.svg)](https://github.com/niceyusen/flowlens/actions/workflows/ci.yml)
#
# Triggers on push to main and all pull requests.
# Runs a matrix build across Python 3.10, 3.11, and 3.12.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff black mypy pytest-cov

      - name: Lint with ruff
        run: ruff check flowlens/ tests/

      - name: Format check with black
        run: black --check flowlens/ tests/ examples/

      - name: Type check with mypy
        run: mypy flowlens/ --ignore-missing-imports

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=flowlens --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
