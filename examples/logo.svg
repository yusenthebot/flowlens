<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b5ce7"/>
      <stop offset="100%" stop-color="#e07a5f"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,1)"/>
    </linearGradient>
    <linearGradient id="lens-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.6)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="248" height="248" rx="48" ry="48" fill="url(#bg-grad)"/>

  <!-- Flow bars (abstract bar chart representing data flow) -->
  <rect x="52" y="140" width="28" height="68" rx="6" fill="url(#bar-grad)" opacity="0.85"/>
  <rect x="92" y="100" width="28" height="108" rx="6" fill="url(#bar-grad)" opacity="0.9"/>
  <rect x="132" y="70" width="28" height="138" rx="6" fill="url(#bar-grad)" opacity="0.95"/>
  <rect x="172" y="110" width="28" height="98" rx="6" fill="url(#bar-grad)" opacity="0.9"/>

  <!-- Flow lines connecting bar tops -->
  <path d="M66 140 Q79 120 106 100 Q119 85 146 70 Q159 80 186 110"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>

  <!-- Lens circle (observability) -->
  <circle cx="176" cy="72" r="30" fill="none" stroke="url(#lens-grad)" stroke-width="4" opacity="0.9"/>
  <!-- Lens handle -->
  <line x1="197" y1="93" x2="214" y2="110" stroke="rgba(255,255,255,0.8)" stroke-width="4" stroke-linecap="round"/>
  <!-- Lens glint -->
  <circle cx="166" cy="62" r="6" fill="rgba(255,255,255,0.4)"/>
</svg>
