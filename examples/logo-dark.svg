<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-grad-dk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b5ce7"/>
      <stop offset="100%" stop-color="#e07a5f"/>
    </linearGradient>
    <linearGradient id="bar-grad-dk" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,1)"/>
    </linearGradient>
    <linearGradient id="lens-grad-dk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>
    <!-- Subtle dark border for visibility on dark backgrounds -->
    <linearGradient id="border-grad-dk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background with subtle border for dark bg visibility -->
  <rect x="2" y="2" width="252" height="252" rx="50" ry="50" fill="none" stroke="url(#border-grad-dk)" stroke-width="1"/>
  <rect x="4" y="4" width="248" height="248" rx="48" ry="48" fill="url(#bg-grad-dk)"/>

  <!-- Flow bars (abstract bar chart representing data flow) -->
  <rect x="52" y="140" width="28" height="68" rx="6" fill="url(#bar-grad-dk)" opacity="0.9"/>
  <rect x="92" y="100" width="28" height="108" rx="6" fill="url(#bar-grad-dk)" opacity="0.95"/>
  <rect x="132" y="70" width="28" height="138" rx="6" fill="url(#bar-grad-dk)"/>
  <rect x="172" y="110" width="28" height="98" rx="6" fill="url(#bar-grad-dk)" opacity="0.95"/>

  <!-- Flow lines connecting bar tops -->
  <path d="M66 140 Q79 120 106 100 Q119 85 146 70 Q159 80 186 110"
        fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>

  <!-- Lens circle (observability) -->
  <circle cx="176" cy="72" r="30" fill="none" stroke="url(#lens-grad-dk)" stroke-width="4.5"/>
  <!-- Lens handle -->
  <line x1="197" y1="93" x2="214" y2="110" stroke="rgba(255,255,255,0.9)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Lens glint -->
  <circle cx="166" cy="62" r="6" fill="rgba(255,255,255,0.5)"/>
</svg>
