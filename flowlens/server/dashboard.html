<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowLens — Agent Observability Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='6' fill='url(%23g)'/%3E%3Cpath d='M8 22V14a2 2 0 014 0v8m4 0V10a2 2 0 014 0v12' stroke='white' stroke-width='2.5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>if(typeof tailwind==='undefined'){var s=document.createElement('script');s.src='/static/tailwind.min.js';document.head.appendChild(s);}</script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2/umd/Recharts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>if(typeof THREE==='undefined'){var s=document.createElement('script');s.src='/static/three.min.js';document.head.appendChild(s);}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; }

    /* Scrollbar */
    * { scrollbar-width: thin; scrollbar-color: rgba(99,102,241,0.2) transparent; }
    *::-webkit-scrollbar { width: 6px; height: 6px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.2); border-radius: 3px; }

    /* Glass morphism */
    .glass {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(99, 102, 241, 0.08);
    }
    .glass-strong {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.12);
    }
    .glass:hover { border-color: rgba(99, 102, 241, 0.15); }

    /* Glow effects */
    .glow-indigo { box-shadow: 0 0 40px -12px rgba(99, 102, 241, 0.2); }
    .glow-emerald { box-shadow: 0 0 40px -12px rgba(16, 185, 129, 0.2); }
    .glow-red { box-shadow: 0 0 40px -12px rgba(239, 68, 68, 0.2); }
    .glow-amber { box-shadow: 0 0 40px -12px rgba(245, 158, 11, 0.2); }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out both; }
    .animate-slide-in { animation: slideInLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid currentColor;
      animation: pulse-ring 1.5s ease-out infinite;
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(99,102,241,0.05) 25%, rgba(99,102,241,0.1) 50%, rgba(99,102,241,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
    }
    .gradient-text {
      background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gradient-border {
      position: relative;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(168,85,247,0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* 3D card hover */
    .card-3d {
      transform-style: preserve-3d;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card-3d:hover {
      transform: perspective(1000px) rotateY(3deg) rotateX(-2deg) translateY(-4px);
      box-shadow: 0 20px 60px -15px rgba(99, 102, 241, 0.15);
    }

    /* Focus ring */
    *:focus-visible {
      outline: 2px solid rgba(99, 102, 241, 0.5);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* Toast */
    @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

    /* Mobile */
    @media (max-width: 768px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .overview-split { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: 1fr !important; }
    }

    /* Recharts overrides */
    .recharts-cartesian-grid-horizontal line,
    .recharts-cartesian-grid-vertical line {
      stroke: rgba(99,102,241,0.06) !important;
    }
    .recharts-tooltip-wrapper .recharts-default-tooltip {
      background: rgba(15,23,42,0.95) !important;
      border: 1px solid rgba(99,102,241,0.2) !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3) !important;
    }

    /* Severity cards */
    .sev-critical { border-left: 3px solid #ef4444; background: rgba(239, 68, 68, 0.06); }
    .sev-warning { border-left: 3px solid #f59e0b; background: rgba(245, 158, 11, 0.06); }
    .sev-info { border-left: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.06); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white antialiased">
  <div id="root"></div>

  <script type="text/babel">
    /* ===================================================================
     *  FlowLens Dashboard — React SPA
     *  All-in-one single-file React dashboard with Three.js, Recharts
     * =================================================================== */

    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    const {
      AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend,
      LineChart, Line,
    } = Recharts;

    // =====================================================================
    // Constants & Agent Profiles
    // =====================================================================
    const API = window.location.origin;
    const AGENT_PROFILES = {
      'vr-alpha':  { name: 'Alpha',   role: 'Core Developer',  color: '#3b82f6', gradient: 'from-blue-500 to-blue-600' },
      'vr-beta':   { name: 'Beta',    role: 'Worker Engineer', color: '#10b981', gradient: 'from-emerald-500 to-emerald-600' },
      'vr-gamma':  { name: 'Gamma',   role: 'Test & Monitor',  color: '#8b5cf6', gradient: 'from-purple-500 to-purple-600' },
      'vr-lead':   { name: 'Lead',    role: 'Architect',       color: '#f59e0b', gradient: 'from-amber-500 to-amber-600' },
      'vr-scribe': { name: 'Scribe',  role: 'Documentation',   color: '#6b7280', gradient: 'from-gray-500 to-gray-600' },
      'main':      { name: 'Main',    role: 'Session',         color: '#6366f1', gradient: 'from-indigo-500 to-indigo-600' },
      'Explore':   { name: 'Explore', role: 'Explorer',        color: '#06b6d4', gradient: 'from-cyan-500 to-cyan-600' },
    };
    const DEFAULT_PROFILE = { name: '?', role: 'Agent', color: '#9ca3af', gradient: 'from-gray-400 to-gray-500' };
    const getProfile = (n) => AGENT_PROFILES[n] || { ...DEFAULT_PROFILE, name: n || '?' };

    const CHART_PALETTE = ['#818cf8', '#a78bfa', '#c084fc', '#22d3ee', '#34d399', '#fbbf24', '#f87171', '#fb923c'];

    // =====================================================================
    // API helpers
    // =====================================================================
    async function apiFetch(path) {
      try {
        const r = await fetch(`${API}${path}`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.json();
      } catch (e) {
        console.warn(`API [${path}]:`, e);
        return null;
      }
    }

    function formatDuration(ms) {
      if (!ms || ms < 1) return '<1ms';
      if (ms < 1000) return ms.toFixed(0) + 'ms';
      return (ms / 1000).toFixed(2) + 's';
    }

    function formatTimeAgo(ts) {
      if (!ts) return '--';
      const sec = Math.floor(Date.now() / 1000 - ts);
      if (sec < 60) return 'just now';
      if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
      if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
      return Math.floor(sec / 86400) + 'd ago';
    }

    function formatCost(v) {
      if (!v || v === 0) return '$0';
      if (v < 0.01) return '$' + v.toFixed(6);
      if (v < 1) return '$' + v.toFixed(4);
      return '$' + v.toFixed(2);
    }

    // =====================================================================
    // Toast System (imperative, outside React)
    // =====================================================================
    const toastContainer = document.createElement('div');
    toastContainer.className = 'fixed top-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none';
    document.body.appendChild(toastContainer);

    function showToast(msg, type = 'info', dur = 3000) {
      const el = document.createElement('div');
      const colors = {
        info: 'border-indigo-500/40 bg-indigo-500/10 text-indigo-200',
        error: 'border-red-500/40 bg-red-500/10 text-red-200',
        success: 'border-emerald-500/40 bg-emerald-500/10 text-emerald-200',
        warning: 'border-amber-500/40 bg-amber-500/10 text-amber-200',
      };
      el.className = `pointer-events-auto flex items-center gap-2 px-4 py-3 rounded-xl border backdrop-blur-xl text-sm ${colors[type] || colors.info} shadow-2xl max-w-sm`;
      el.style.animation = 'toastIn 0.3s ease-out';
      el.textContent = msg;
      toastContainer.appendChild(el);
      setTimeout(() => {
        el.style.animation = 'toastOut 0.3s ease-in forwards';
        setTimeout(() => el.remove(), 300);
      }, dur);
    }

    // =====================================================================
    // useWebSocket hook
    // =====================================================================
    function useWebSocket(onMessage) {
      const [connected, setConnected] = useState(false);
      const wsRef = useRef(null);
      const attemptsRef = useRef(0);

      const connect = useCallback(() => {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${proto}//${location.host}/ws/traces`);
        wsRef.current = ws;
        ws.onopen = () => { setConnected(true); attemptsRef.current = 0; };
        ws.onmessage = (e) => {
          try { const d = JSON.parse(e.data); if (d.event === 'trace_ingested') onMessage(d.data); }
          catch (_) {}
        };
        ws.onclose = () => {
          setConnected(false);
          attemptsRef.current++;
          const delay = Math.min(1000 * Math.pow(2, attemptsRef.current - 1), 30000);
          setTimeout(connect, delay);
        };
        ws.onerror = () => { setConnected(false); };
      }, [onMessage]);

      useEffect(() => { connect(); return () => { if (wsRef.current) wsRef.current.close(); }; }, [connect]);
      return connected;
    }

    // =====================================================================
    // useAnimatedCounter hook
    // =====================================================================
    function useAnimatedCounter(target, duration = 800) {
      const [value, setValue] = useState(0);
      const frameRef = useRef(null);
      useEffect(() => {
        const start = value;
        const startTime = performance.now();
        const isFloat = String(target).includes('.');
        function tick(now) {
          const p = Math.min((now - startTime) / duration, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          const cur = start + (target - start) * eased;
          setValue(isFloat ? parseFloat(cur.toFixed(4)) : Math.round(cur));
          if (p < 1) frameRef.current = requestAnimationFrame(tick);
        }
        frameRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(frameRef.current);
      }, [target]);
      return value;
    }

    // =====================================================================
    // StatCard Component
    // =====================================================================
    function StatCard({ label, value, suffix, icon, color, delay = 0, sparkData }) {
      const animVal = useAnimatedCounter(typeof value === 'number' ? value : 0);
      const displayVal = typeof value === 'number'
        ? (String(value).includes('.') ? animVal.toFixed(value < 1 ? 1 : value < 100 ? 2 : 0) : animVal.toLocaleString())
        : value;

      return (
        <div
          className="glass rounded-2xl p-5 glow-indigo card-3d animate-fade-in-up relative overflow-hidden group"
          style={{ animationDelay: `${delay}ms` }}
        >
          {/* Subtle gradient orb */}
          <div className={`absolute -top-8 -right-8 w-24 h-24 rounded-full bg-gradient-to-br ${color || 'from-indigo-500/10 to-purple-500/10'} blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500`} />
          <div className="flex items-center justify-between mb-3 relative z-10">
            <span className="text-[11px] font-semibold text-slate-400 uppercase tracking-widest">{label}</span>
            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500/10 to-purple-500/10 flex items-center justify-center text-indigo-400">
              {icon}
            </div>
          </div>
          <div className="text-3xl font-bold text-white tracking-tight relative z-10 tabular-nums">
            {displayVal}{suffix && <span className="text-lg font-normal text-slate-500 ml-1">{suffix}</span>}
          </div>
          {sparkData && sparkData.length > 1 && (
            <div className="mt-3 h-8 relative z-10">
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={sparkData}>
                  <defs>
                    <linearGradient id={`spark-${label}`} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#818cf8" stopOpacity={0.3}/>
                      <stop offset="100%" stopColor="#818cf8" stopOpacity={0}/>
                    </linearGradient>
                  </defs>
                  <Area type="monotone" dataKey="v" stroke="#818cf8" strokeWidth={1.5} fill={`url(#spark-${label})`} dot={false} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          )}
        </div>
      );
    }

    // =====================================================================
    // Agent Avatar
    // =====================================================================
    function AgentAvatar({ name, size = 32, showPulse = false }) {
      const p = getProfile(name);
      return (
        <div className="relative flex-shrink-0" style={{ width: size, height: size }}>
          <div
            className={`w-full h-full rounded-xl bg-gradient-to-br ${p.gradient} flex items-center justify-center text-white font-bold shadow-lg`}
            style={{ fontSize: size * 0.4 }}
          >
            {p.name.charAt(0)}
          </div>
          {showPulse && (
            <span className="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full bg-emerald-500 border-2 border-slate-900">
              <span className="absolute inset-0 rounded-full bg-emerald-500 animate-ping opacity-75" />
            </span>
          )}
        </div>
      );
    }

    // =====================================================================
    // Agent Team Strip
    // =====================================================================
    function AgentTeamStrip({ agents }) {
      if (!agents || agents.length === 0) {
        return <div className="text-xs text-slate-500 py-4">No agents detected yet.</div>;
      }
      const activeCount = agents.filter(a => a.status === 'active').length;
      return (
        <div className="mb-6">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-semibold text-white flex items-center gap-2">
              Agent Team
              <span className="text-xs font-normal text-slate-500">{activeCount} active / {agents.length} total</span>
            </h2>
          </div>
          <div className="flex gap-3 overflow-x-auto pb-2 scrollbar-thin">
            {agents.map((a, i) => {
              const p = getProfile(a.agent);
              const isActive = a.status === 'active';
              const tools = (a.recent_tools || []).slice(0, 3).join(', ') || 'idle';
              return (
                <div
                  key={a.agent}
                  className={`glass rounded-xl p-3.5 min-w-[170px] flex-shrink-0 card-3d animate-slide-in cursor-pointer ${isActive ? 'border-emerald-500/30' : ''}`}
                  style={{ animationDelay: `${i * 80}ms` }}
                >
                  <div className="flex items-center gap-2.5 mb-2">
                    <AgentAvatar name={a.agent} size={36} showPulse={isActive} />
                    <div className="min-w-0">
                      <div className="text-xs font-semibold text-white truncate">{p.name}</div>
                      <div className="text-[10px] text-slate-500">{p.role}</div>
                    </div>
                  </div>
                  <div className="text-[10px] text-slate-400 truncate">{tools}</div>
                  <div className="text-[10px] text-slate-500 mt-1">
                    {formatTimeAgo(a.last_seen)} · {a.trace_count_1h || 0} ops
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // =====================================================================
    // Three.js 3D Agent Network
    // =====================================================================
    function ThreeDGraph({ data, height = 320 }) {
      const containerRef = useRef(null);
      const stateRef = useRef(null);

      useEffect(() => {
        if (!containerRef.current || typeof THREE === 'undefined' || !data || !data.nodes || data.nodes.length === 0) return;

        // Cleanup previous
        if (stateRef.current) {
          if (stateRef.current.animId) cancelAnimationFrame(stateRef.current.animId);
          if (stateRef.current.renderer) {
            stateRef.current.renderer.dispose();
            if (stateRef.current.renderer.domElement?.parentNode) {
              stateRef.current.renderer.domElement.parentNode.removeChild(stateRef.current.renderer.domElement);
            }
          }
          if (stateRef.current.labelDiv?.parentNode) stateRef.current.labelDiv.parentNode.removeChild(stateRef.current.labelDiv);
          if (stateRef.current.ro) stateRef.current.ro.disconnect();
        }

        const el = containerRef.current;
        const cw = el.clientWidth || 600;
        const ch = el.clientHeight || height;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(cw, ch);
        renderer.setClearColor(0x0f172a, 1);
        renderer.domElement.style.cssText = 'display:block;width:100%;height:100%;border-radius:12px;';
        el.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, cw / ch, 0.1, 1000);
        camera.position.set(0, 0, 5.5);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const pt = new THREE.PointLight(0xffffff, 1.2, 50);
        pt.position.set(0, 5, 5);
        scene.add(pt);

        const nodes = data.nodes || [];
        const edges = data.edges || [];
        const maxCount = nodes.reduce((a, n) => Math.max(a, n.trace_count || 1), 1);
        const radius = Math.max(1.4, nodes.length * 0.38);
        const positions = nodes.map((_, i) => {
          const a = (i / nodes.length) * Math.PI * 2 - Math.PI / 2;
          return [Math.cos(a) * radius, Math.sin(a) * radius, 0];
        });

        const nodeIdx = {};
        nodes.forEach((n, i) => { nodeIdx[n.id] = i; });

        const group = new THREE.Group();
        scene.add(group);
        const meshes = [];

        // Build spheres
        nodes.forEach((n, i) => {
          const p = getProfile(n.id);
          const hex = p.color.replace('#', '');
          const color = new THREE.Color(
            parseInt(hex.substring(0, 2), 16) / 255,
            parseInt(hex.substring(2, 4), 16) / 255,
            parseInt(hex.substring(4, 6), 16) / 255
          );
          const norm = 0.3 + ((n.trace_count || 1) / maxCount) * 0.7;
          const geo = new THREE.SphereGeometry(norm, 32, 32);
          const isAct = n.status === 'active';
          const mat = new THREE.MeshStandardMaterial({
            color, emissive: color,
            emissiveIntensity: isAct ? 0.55 : 0.1,
            transparent: !isAct, opacity: isAct ? 1 : 0.45,
            roughness: 0.3, metalness: 0.15,
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(...positions[i]);
          mesh.userData = { id: n.id, baseEm: isAct ? 0.55 : 0.1, isAct };
          group.add(mesh);
          meshes.push(mesh);
        });

        // Build edges
        const maxEdge = edges.reduce((a, e) => Math.max(a, e.count || 1), 1);
        edges.forEach(e => {
          const si = nodeIdx[e.source], ti = nodeIdx[e.target];
          if (si === undefined || ti === undefined) return;
          const pts = [new THREE.Vector3(...positions[si]), new THREE.Vector3(...positions[ti])];
          const geoL = new THREE.BufferGeometry().setFromPoints(pts);
          const opacity = 0.2 + ((e.count || 1) / maxEdge) * 0.5;
          const matL = new THREE.LineDashedMaterial({
            color: 0xffffff, transparent: true, opacity, dashSize: 0.18, gapSize: 0.09,
          });
          const line = new THREE.Line(geoL, matL);
          line.computeLineDistances();
          group.add(line);
        });

        // Labels
        el.style.position = 'relative';
        const labelDiv = document.createElement('div');
        labelDiv.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;';
        el.appendChild(labelDiv);
        const labels = nodes.map(n => {
          const p = getProfile(n.id);
          const lbl = document.createElement('div');
          lbl.style.cssText = 'position:absolute;transform:translate(-50%,-100%);pointer-events:none;white-space:nowrap;font-family:Inter,sans-serif;line-height:1.3;padding:2px 8px;border-radius:6px;background:rgba(15,23,42,0.85);backdrop-filter:blur(4px);border:1px solid rgba(99,102,241,0.1);';
          lbl.innerHTML = `<span style="font-size:10px;font-weight:600;color:${p.color}">${p.name}</span><br><span style="font-size:9px;color:#94a3b8">${p.role}</span>`;
          labelDiv.appendChild(lbl);
          return lbl;
        });

        // Mouse interaction
        let isDragging = false, lastX = 0, lastY = 0, rotX = 0, rotY = 0;
        const onDown = (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; };
        const onMove = (e) => {
          if (!isDragging) return;
          rotY += (e.clientX - lastX) * 0.008;
          rotX += (e.clientY - lastY) * 0.008;
          rotX = Math.max(-1.2, Math.min(1.2, rotX));
          lastX = e.clientX; lastY = e.clientY;
        };
        const onUp = () => { isDragging = false; };
        renderer.domElement.addEventListener('mousedown', onDown);
        renderer.domElement.addEventListener('mousemove', onMove);
        renderer.domElement.addEventListener('mouseup', onUp);
        renderer.domElement.addEventListener('mouseleave', onUp);

        // Animation loop
        let frame = 0, animId;
        function animate() {
          animId = requestAnimationFrame(animate);
          frame++;
          if (!isDragging) rotY += 0.0008;
          group.rotation.y = rotY;
          group.rotation.x = rotX;
          meshes.forEach(m => {
            if (m.userData.isAct) {
              m.material.emissiveIntensity = 0.55 + Math.sin(frame * 0.05) * 0.25;
            }
          });
          renderer.render(scene, camera);
          // Update labels
          const elW = el.clientWidth, elH = el.clientHeight;
          nodes.forEach((n, i) => {
            if (!labels[i] || !meshes[i]) return;
            const wp = new THREE.Vector3();
            meshes[i].getWorldPosition(wp);
            const proj = wp.clone().project(camera);
            const sx = (proj.x * 0.5 + 0.5) * elW;
            const wpTop = wp.clone();
            wpTop.y += (meshes[i].geometry.parameters.radius || 0.5);
            const sy = (-(wpTop.clone().project(camera).y) * 0.5 + 0.5) * elH;
            labels[i].style.left = sx + 'px';
            labels[i].style.top = sy + 'px';
            labels[i].style.display = proj.z < 1 ? 'block' : 'none';
          });
        }
        animate();

        const ro = new ResizeObserver(() => {
          const nw = el.clientWidth, nh = el.clientHeight;
          if (nw && nh) { renderer.setSize(nw, nh); camera.aspect = nw / nh; camera.updateProjectionMatrix(); }
        });
        ro.observe(el);

        stateRef.current = { renderer, animId, labelDiv, ro };

        return () => {
          cancelAnimationFrame(animId);
          renderer.dispose();
          if (renderer.domElement?.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
          if (labelDiv?.parentNode) labelDiv.parentNode.removeChild(labelDiv);
          ro.disconnect();
        };
      }, [data, height]);

      return <div ref={containerRef} className="rounded-xl overflow-hidden" style={{ height: height + 'px' }} />;
    }

                <Area type="monotone" dataKey="traces" stroke="#818cf8" strokeWidth={2} fill="url(#trendGrad)" name="Traces" />
                <Area type="monotone" dataKey="errors" stroke="#f87171" strokeWidth={1.5} fill="transparent" strokeDasharray="5 3" name="Errors" />

      return (
        <div className="max-h-[400px] overflow-y-auto divide-y divide-white/5">

                    <span className="text-[10px] font-medium" style={{ color: p.color }}>{e.agent}</span>

    // =====================================================================
    // Trace Row
    // =====================================================================
    function TraceRow({ trace, compact, onOpen }) {
      const hasErr = trace.has_errors === true || trace.has_errors === 1;
      const tags = trace.tags || {};
      const meta = trace.metadata || {};
      const agentName = tags.agent || null;
      const proj = tags.project || meta.project || (meta.cwd ? meta.cwd.split('/').pop() : null);
      const displayName = agentName ? (proj || trace.service_name || 'session') : (agentName || proj || (trace.trace_id || '').substring(0, 12) + '...');
      const p = agentName ? getProfile(agentName) : null;

      return (
        <div
          className="flex items-center gap-4 px-5 py-3.5 hover:bg-white/[0.02] cursor-pointer transition group"
          onClick={() => onOpen && onOpen(trace.trace_id)}
        >
          <span className={`w-2 h-2 rounded-full flex-shrink-0 ${hasErr ? 'bg-red-500' : 'bg-emerald-500'}`} />
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-sm font-medium text-slate-200 group-hover:text-white transition">{displayName}</span>

                <span className="px-1.5 py-0.5 text-[10px] font-medium rounded border" style={{ borderColor: p.color + '40', color: p.color, background: p.color + '15' }}>

            </div>
            <div className="text-xs text-slate-500 mt-0.5 flex items-center gap-2">
              <span>{formatTimeAgo(trace.start_time)}</span>
              {!compact && <><span className="text-slate-700">|</span><span>{trace.span_count || 0} ops</span></>}

          <div className="flex items-center gap-6 text-xs text-slate-500">
            <div className="text-right">
              <div className="text-slate-400">{(trace.duration_ms || 0).toFixed(0)}ms</div>
              <div>{formatCost(trace.total_cost_usd)}</div>
            </div>

          </div>
        </div>
      );
    }

    // =====================================================================
    // Trace Detail View
    // =====================================================================
    function TraceDetailView({ traceId, onBack }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!traceId) return;
        setLoading(true);
        apiFetch(`/v1/traces/${traceId}`).then(d => { setData(d); setLoading(false); });
      }, [traceId]);

      if (loading) return <div className="text-center text-slate-500 py-16">Loading trace...</div>;
      if (!data) return <div className="text-center text-red-400 py-16">Failed to load trace.</div>;

      const hasErr = data.has_errors === true || data.has_errors === 1;
      const tags = data.tags || {};
      const agentName = tags.agent || null;
      const spans = data.spans || [];
      spans.sort((a, b) => (a.start_time || 0) - (b.start_time || 0));

      const minT = Math.min(...spans.map(s => s.start_time || 0));
      const maxT = Math.max(...spans.map(s => s.end_time || s.start_time || 0));
      const totalD = maxT - minT || 1;

      const kindColors = {
        llm: '#a78bfa', tool: '#34d399', agent: '#c084fc',
        chain: '#fbbf24', retrieval: '#22d3ee', custom: '#94a3b8'
      };

      return (
        <div className="animate-fade-in">
          <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-slate-400 hover:text-slate-200 mb-4 transition">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>
            Back
          </button>

          {/* Header */}
          <div className="glass rounded-2xl p-5 mb-4">
            <div className="flex items-center gap-3 mb-4">
              {agentName && <AgentAvatar name={agentName} size={40} />}
              <div>
                <div className="text-lg font-semibold text-white font-mono">{data.trace_id.substring(0, 24)}...</div>
                <div className="text-xs text-slate-500">{data.service_name || 'unknown'}</div>
              </div>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <div className="text-center p-3 rounded-xl bg-white/[0.03] border border-white/5">
                <div className="text-2xl font-bold text-white tabular-nums">{formatDuration(data.duration_ms)}</div>
                <div className="text-[10px] text-slate-500 uppercase tracking-wider mt-0.5">Duration</div>
              </div>
              <div className="text-center p-3 rounded-xl bg-white/[0.03] border border-white/5">
                <div className="text-2xl font-bold text-emerald-400 tabular-nums">{formatCost(data.total_cost_usd)}</div>
                <div className="text-[10px] text-slate-500 uppercase tracking-wider mt-0.5">Cost</div>
              </div>
              <div className="text-center p-3 rounded-xl bg-white/[0.03] border border-white/5">
                <div className="text-2xl font-bold text-white tabular-nums">{spans.length}</div>
                <div className="text-[10px] text-slate-500 uppercase tracking-wider mt-0.5">Spans</div>
              </div>
              <div className={`text-center p-3 rounded-xl ${hasErr ? 'bg-red-500/10 border border-red-500/20' : 'bg-emerald-500/10 border border-emerald-500/20'}`}>
                <div className={`text-2xl font-bold ${hasErr ? 'text-red-400' : 'text-emerald-400'} tabular-nums`}>
                  {hasErr ? (data.error_count || 1) : 'OK'}
                </div>
                <div className={`text-[10px] ${hasErr ? 'text-red-400' : 'text-emerald-400'} uppercase tracking-wider mt-0.5`}>
                  {hasErr ? 'Errors' : 'Status'}
                </div>
              </div>
            </div>
          </div>

          {/* Waterfall Timeline */}
          <div className="glass rounded-2xl p-5 overflow-x-auto">
            <h3 className="text-sm font-semibold text-white mb-3">Span Timeline</h3>
            {/* Legend */}
            <div className="flex flex-wrap gap-3 mb-3 pb-3 border-b border-white/5">
              {Object.entries(kindColors).map(([k, c]) => (
                <div key={k} className="flex items-center gap-1.5 text-xs">
                  <span className="w-3 h-1.5 rounded-full" style={{ background: c }} />
                  <span style={{ color: c }}>{k.charAt(0).toUpperCase() + k.slice(1)}</span>
                </div>
              ))}
            </div>
            <div className="space-y-0.5">
              {spans.map((span, idx) => {
                const kind = (span.kind || 'custom').toLowerCase();
                const barColor = span.status === 'error' ? '#f87171' : (kindColors[kind] || '#94a3b8');
                const spanStart = (span.start_time || 0) - minT;
                const spanDur = ((span.end_time || span.start_time || 0) - (span.start_time || 0));
                const leftPct = (spanStart / totalD) * 100;
                const widthPct = Math.max((spanDur / totalD) * 100, 0.5);
                const durMs = span.duration_ms || spanDur * 1000 || 0;

                return (
                  <div key={span.span_id || idx} className="flex items-center gap-0 py-1 px-2 rounded-lg hover:bg-white/[0.03] transition group">
                    <div className="w-[200px] min-w-[200px] flex-shrink-0 flex items-center gap-1.5">
                      <span className="px-1.5 py-0.5 text-[9px] font-medium rounded" style={{ background: barColor + '20', color: barColor }}>
                        {kind}
                      </span>
                      <span className="text-xs text-slate-300 truncate group-hover:text-white transition">{span.name}</span>
                    </div>
                    <div className="flex-1 relative h-6 min-w-0">
                      <div
                        className="absolute top-0.5 h-5 rounded transition-all"
                        style={{ left: leftPct + '%', width: widthPct + '%', background: barColor, opacity: 0.75 }}
                      >
                        {widthPct > 8 && <span className="px-1.5 text-[10px] font-medium text-white/90 whitespace-nowrap">{formatDuration(durMs)}</span>}
                      </div>
                    </div>
                    <div className="text-xs text-slate-500 w-[60px] text-right flex-shrink-0 tabular-nums">
                      {formatDuration(durMs)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

                    </div>
                    <div className="grid grid-cols-2 gap-3 text-xs">
                      <div><div className="text-slate-500 uppercase tracking-wider mb-0.5 text-[10px]">Traces</div><div className="text-white font-medium">{a.trace_count}</div></div>
                      <div><div className="text-slate-500 uppercase tracking-wider mb-0.5 text-[10px]">Error Rate</div><div className={`${errColor} font-medium`}>{errPct}%</div></div>
                      <div><div className="text-slate-500 uppercase tracking-wider mb-0.5 text-[10px]">Avg Latency</div><div className="text-white font-medium">{formatDuration(a.avg_duration_ms)}</div></div>
                      <div><div className="text-slate-500 uppercase tracking-wider mb-0.5 text-[10px]">Cost</div><div className="text-white font-medium">{formatCost(a.total_cost_usd)}</div></div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {networkData && networkData.nodes && networkData.nodes.length > 0 && (
            <div>
              <h2 className="text-sm font-semibold text-white mb-3">Agent Relationships</h2>
              <div className="glass rounded-2xl p-4 overflow-hidden">
                <ThreeDGraph data={networkData} height={350} />
              </div>
            </div>
          )}
        </div>
      );
    }

    // =====================================================================
    // Traces View
    // =====================================================================
    function TracesView({ onOpenTrace }) {
      const [traces, setTraces] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [errorsOnly, setErrorsOnly] = useState(false);
      const [offset, setOffset] = useState(0);
      const limit = 30;

      const load = useCallback(async () => {
        setLoading(true);
        let url = `/v1/traces?limit=${limit}&offset=${offset}`;
        if (search) url += `&service=${encodeURIComponent(search)}`;
        if (errorsOnly) url += `&errors_only=true`;
        const d = await apiFetch(url);
        setTraces(d?.traces || []);
        setLoading(false);
      }, [search, errorsOnly, offset]);

      useEffect(() => { load(); }, [load]);

      return (
        <div className="animate-fade-in">
          <div className="flex flex-wrap gap-3 mb-4">
            <div className="relative">
              <input
                type="text" placeholder="Search by service..."
                value={search} onChange={e => setSearch(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') { setOffset(0); load(); } }}
                className="bg-white/5 border border-white/10 rounded-xl pl-9 pr-3 py-2 text-sm text-slate-200 placeholder-slate-600 w-64 focus:border-indigo-500/50 focus:outline-none transition"
              />
              <svg className="w-4 h-4 text-slate-600 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <label className="flex items-center gap-2 text-sm text-slate-400 cursor-pointer">
              <input type="checkbox" checked={errorsOnly} onChange={e => { setErrorsOnly(e.target.checked); setOffset(0); }}
                className="rounded bg-white/5 border-white/10 text-red-500 focus:ring-red-500/30" />
              <span className="text-xs">Errors only</span>
            </label>
            <button onClick={() => { setOffset(0); load(); }} className="px-4 py-2 text-xs font-medium bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition">
              Search
            </button>
          </div>

          <div className="glass rounded-2xl overflow-hidden">
            {loading ? (
              <div className="p-6 space-y-3">
                {[1,2,3,4,5].map(i => <div key={i} className="skeleton h-12 rounded-lg" />)}
              </div>
            ) : traces.length === 0 ? (
              <div className="p-12 text-center text-slate-500 text-sm">No traces found.</div>
            ) : (
              <div className="divide-y divide-white/5">
                {traces.map(t => <TraceRow key={t.trace_id} trace={t} onOpen={onOpenTrace} />)}
              </div>
            )}
          </div>

          <div className="flex items-center justify-between mt-4">
            <button onClick={() => setOffset(Math.max(0, offset - limit))} disabled={offset === 0}
              className="px-3 py-1.5 text-xs text-slate-400 bg-white/5 rounded-lg border border-white/10 hover:border-white/20 transition disabled:opacity-30">
              Previous
            </button>
            <span className="text-xs text-slate-500">
              {traces.length > 0 ? `Showing ${offset + 1}-${offset + traces.length}` : 'No results'}
            </span>
            <button onClick={() => setOffset(offset + limit)} disabled={traces.length < limit}
              className="px-3 py-1.5 text-xs text-slate-400 bg-white/5 rounded-lg border border-white/10 hover:border-white/20 transition disabled:opacity-30">
              Next
            </button>
          </div>
        </div>
      );
    }

    // =====================================================================
    // Cost View
    // =====================================================================
    function CostView() {
      const [costData, setCostData] = useState(null);
      const [agentCosts, setAgentCosts] = useState([]);

      useEffect(() => {
        Promise.all([
          apiFetch('/v1/cost/breakdown?group_by=service_name'),
          apiFetch('/v1/cost/breakdown?group_by=kind'),
          apiFetch('/v1/agents/summary'),
        ]).then(([byService, byKind, agSummary]) => {
          setCostData({ byService: byService || [], byKind: byKind || [] });
          setAgentCosts((agSummary?.agents || []).sort((a, b) => (b.total_cost_usd || 0) - (a.total_cost_usd || 0)));
        });
      }, []);

      const pieData = (costData?.byKind || []).map((d, i) => ({
        name: d.dimension || 'unknown',
        value: d.total_cost_usd || 0,
        fill: CHART_PALETTE[i % CHART_PALETTE.length],
      }));

      const barData = (costData?.byService || []).map(d => ({
        name: (d.dimension || 'unknown').substring(0, 15),
        cost: d.total_cost_usd || 0,
      }));

      return (
        <div className="animate-fade-in">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            {/* Pie chart: Cost by Kind */}
            <div className="glass rounded-2xl p-5">
              <h3 className="text-sm font-semibold text-white mb-4">Cost by Span Kind</h3>
              <div style={{ height: 280 }}>
                {pieData.length === 0 ? (
                  <div className="h-full flex items-center justify-center text-slate-500 text-xs">No cost data</div>
                ) : (
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={pieData} cx="50%" cy="50%" innerRadius={60} outerRadius={100} dataKey="value" stroke="none">
                        {pieData.map((entry, i) => <Cell key={i} fill={entry.fill} />)}
                      </Pie>
                      <Tooltip
                        contentStyle={{ background: 'rgba(15,23,42,0.95)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: 8, color: '#e2e8f0', fontSize: 12 }}
                        formatter={(v) => formatCost(v)}
                      />
                      <Legend wrapperStyle={{ fontSize: 11, color: '#94a3b8' }} />
                    </PieChart>
                  </ResponsiveContainer>
                )}
              </div>
            </div>

            {/* Bar chart: Cost by Service */}
            <div className="glass rounded-2xl p-5">
              <h3 className="text-sm font-semibold text-white mb-4">Cost by Service</h3>
              <div style={{ height: 280 }}>
                {barData.length === 0 ? (
                  <div className="h-full flex items-center justify-center text-slate-500 text-xs">No cost data</div>
                ) : (
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={barData} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" stroke="rgba(99,102,241,0.06)" />
                      <XAxis type="number" tick={{ fill: '#64748b', fontSize: 10 }} axisLine={false} tickFormatter={v => '$' + v.toFixed(4)} />
                      <YAxis type="category" dataKey="name" tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={false} width={100} />
                      <Tooltip
                        contentStyle={{ background: 'rgba(15,23,42,0.95)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: 8, color: '#e2e8f0', fontSize: 12 }}
                        formatter={(v) => formatCost(v)}
                      />
                      <Bar dataKey="cost" fill="#818cf8" radius={[0, 4, 4, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                )}
              </div>
            </div>
          </div>

          {/* Agent cost breakdown */}
          {agentCosts.length > 0 && (
            <div className="glass rounded-2xl p-5">
              <h3 className="text-sm font-semibold text-white mb-4">Cost by Agent</h3>
              <div style={{ height: 200 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={agentCosts.map(a => ({ name: getProfile(a.agent).name, cost: a.total_cost_usd || 0 }))} layout="vertical">
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(99,102,241,0.06)" />
                    <XAxis type="number" tick={{ fill: '#64748b', fontSize: 10 }} axisLine={false} tickFormatter={v => '$' + v.toFixed(4)} />
                    <YAxis type="category" dataKey="name" tick={{ fill: '#94a3b8', fontSize: 11 }} axisLine={false} width={80} />
                    <Tooltip
                      contentStyle={{ background: 'rgba(15,23,42,0.95)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: 8, color: '#e2e8f0', fontSize: 12 }}
                      formatter={(v) => formatCost(v)}
                    />
                    <Bar dataKey="cost" radius={[0, 4, 4, 0]}>
                      {agentCosts.map((a, i) => <Cell key={i} fill={getProfile(a.agent).color + 'cc'} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          )}
        </div>
      );
    }

    // =====================================================================
    // Patterns View
    // =====================================================================
    function PatternsView() {
      const [patterns, setPatterns] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('all');

      useEffect(() => {
        (async () => {
          setLoading(true);
          const tracesData = await apiFetch('/v1/traces?limit=20');
          if (!tracesData?.traces?.length) { setLoading(false); return; }
          const errTraces = tracesData.traces.filter(t => t.has_errors === true || t.has_errors === 1);
          const allPatterns = [];
          for (const tr of errTraces.slice(0, 10)) {
            try {
              const dag = await apiFetch(`/v1/traces/${tr.trace_id}/dag`);
              if (dag?.patterns) {
                dag.patterns.forEach(p => allPatterns.push({ ...p, traceId: tr.trace_id }));
              }
            } catch (_) {}
          }
          setPatterns(allPatterns);
          setLoading(false);
        })();
      }, []);

      const filtered = filter === 'all' ? patterns : patterns.filter(p => (p.severity || 'info').toLowerCase() === filter);

      const sevIcons = {
        critical: <svg className="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>,
        warning: <svg className="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>,
        info: <svg className="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
      };

      return (
        <div className="animate-fade-in">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-semibold text-white">Detected Patterns</h2>
            <div className="flex gap-1.5">
              {['all', 'critical', 'warning', 'info'].map(s => (
                <button key={s} onClick={() => setFilter(s)}
                  className={`px-2.5 py-1 text-[10px] rounded-lg font-medium transition capitalize ${
                    filter === s ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30' : 'text-slate-400 hover:text-white border border-transparent'
                  }`}>
                  {s}
                </button>
              ))}
            </div>
          </div>
          {loading ? (
            <div className="glass rounded-2xl p-6 space-y-3">
              {[1,2,3].map(i => <div key={i} className="skeleton h-16 rounded-lg" />)}
            </div>
          ) : filtered.length === 0 ? (
            <div className="glass rounded-2xl p-12 text-center">
              <svg className="w-16 h-16 text-emerald-500/20 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <p className="text-sm text-slate-400">No patterns detected</p>
              <p className="text-xs text-slate-600 mt-1">Anti-patterns appear when traces contain errors.</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
              {filtered.map((p, i) => {
                const sev = (p.severity || 'info').toLowerCase();
                return (
                  <div key={i} className={`glass rounded-xl p-4 sev-${sev} hover:border-indigo-500/20 transition cursor-pointer`}>
                    <div className="flex items-start gap-3 mb-2">
                      {sevIcons[sev] || sevIcons.info}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-xs font-bold text-white">{(p.pattern || 'Unknown').replace(/_/g, ' ')}</span>
                          <span className={`px-1.5 py-0.5 text-[10px] font-semibold uppercase rounded ${
                            sev === 'critical' ? 'bg-red-500/15 text-red-400 border border-red-500/30' :
                            sev === 'warning' ? 'bg-amber-500/15 text-amber-400 border border-amber-500/30' :
                            'bg-blue-500/15 text-blue-400 border border-blue-500/30'
                          }`}>{sev}</span>
                        </div>
                        <p className="text-xs text-slate-400 mt-1">{p.description}</p>
                      </div>
                    </div>
                    {p.recommendation && (
                      <div className="mt-2 p-2.5 rounded-lg bg-white/[0.03] border border-white/5 text-xs text-slate-500">
                        <span className="text-slate-600 font-medium">Rec: </span>{p.recommendation}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // =====================================================================
    // Header

        <header className="sticky top-0 z-50 glass-strong border-b border-white/5">

            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
              </div>
              <div>
                <h1 className="text-lg font-bold tracking-tight flex items-center gap-2">
                  <span className="gradient-text">FlowLens</span>
                  {wsConnected && <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse" />}
                </h1>
                <p className="text-[10px] text-slate-500 -mt-0.5 tracking-widest uppercase">Agent Observability</p>
              </div>
            </div>
            <div className="flex items-center gap-4">

    // =====================================================================
    // NavTabs
    // =====================================================================
    function NavTabs({ view, setView }) {
      const tabs = [
        { id: 'overview', label: 'Overview' },
        { id: 'agents', label: 'Agents' },
        { id: 'traces', label: 'Traces' },
        { id: 'cost', label: 'Cost Analysis' },
        { id: 'patterns', label: 'Patterns' },
      ];
      return (
        <nav className="max-w-[1600px] mx-auto px-6 pt-4">
          <div className="flex gap-1 border-b border-white/5">
            {tabs.map(t => (
              <button
                key={t.id}
                onClick={() => setView(t.id)}
                className={`px-4 py-2.5 text-sm font-medium border-b-2 transition-all duration-200 rounded-t-lg ${
                  view === t.id
                    ? 'border-indigo-500 text-indigo-300 bg-indigo-500/[0.06]'
                    : 'border-transparent text-slate-500 hover:text-slate-300 hover:border-indigo-500/30'
                }`}
              >
                {t.label}
              </button>
            ))}
          </div>
        </nav>
      );
    }

    // =====================================================================
    // Root App
    // =====================================================================
    function App() {
      const [view, setView] = useState('overview');
      const [stats, setStats] = useState(null);
      const [agents, setAgents] = useState([]);
      const [agentSummary, setAgentSummary] = useState([]);
      const [recentTraces, setRecentTraces] = useState([]);
      const [events, setEvents] = useState([]);
      const [trendData, setTrendData] = useState([]);
      const [networkData, setNetworkData] = useState(null);
      const [lastRefresh, setLastRefresh] = useState(null);
      const [selectedTrace, setSelectedTrace] = useState(null);
      const [trendHours, setTrendHours] = useState(24);

      // Data loading
      const loadOverview = useCallback(async () => {
        const [s, a, t, e, n] = await Promise.all([
          apiFetch('/v1/stats'),
          apiFetch('/v1/agents/activity'),
          apiFetch('/v1/traces?limit=8'),
          apiFetch('/v1/activity/stream?limit=30'),
          apiFetch('/v1/agents/network').catch(() => apiFetch('/v1/agents/relationships')),
        ]);
        if (s) setStats(s);
        if (a?.agents) setAgents(a.agents);
        if (t?.traces) setRecentTraces(t.traces);
        if (e?.events) setEvents(e.events);
        if (n) setNetworkData(n);
        setLastRefresh(new Date().toLocaleTimeString());
      }, []);

      const loadTrend = useCallback(async (hrs) => {
        const bucketMin = hrs <= 6 ? 10 : hrs <= 24 ? 60 : 360;
        const d = await apiFetch(`/v1/stats/trends?hours=${hrs}&bucket_minutes=${bucketMin}`);
        if (d?.buckets) setTrendData(d.buckets);
      }, []);

      const loadAgentSummary = useCallback(async () => {
        const d = await apiFetch('/v1/agents/summary');
        if (d?.agents) setAgentSummary(d.agents);
      }, []);

      // Set trend hours with loading
      const changeTrendHours = useCallback((hrs) => {
        setTrendHours(hrs);
        loadTrend(hrs);
      }, [loadTrend]);

      // Initial load
      useEffect(() => {
        loadOverview();
        loadTrend(24);
        loadAgentSummary();
      }, [loadOverview, loadTrend, loadAgentSummary]);

      // Auto-refresh every 15s
      useEffect(() => {
        const timer = setInterval(() => {
          if (view === 'overview') { loadOverview(); loadTrend(trendHours); }
        }, 15000);
        return () => clearInterval(timer);
      }, [view, loadOverview, loadTrend, trendHours]);

      // WebSocket handler
      const onWsMessage = useCallback((data) => {
        if (data.has_errors) showToast(`Error trace: ${(data.trace_id || '').substring(0, 12)}...`, 'error', 5000);
        else showToast(`New trace from ${data.service_name || 'agent'}`, 'info', 2000);
        if (view === 'overview') { loadOverview(); loadTrend(trendHours); }
      }, [view, loadOverview, loadTrend, trendHours]);
      const wsConnected = useWebSocket(onWsMessage);

      // Load view-specific data
      useEffect(() => {
        if (view === 'overview') { loadOverview(); loadTrend(trendHours); }
        if (view === 'agents') { loadAgentSummary(); }
      }, [view]);

      // Keyboard shortcuts
      useEffect(() => {
        const handler = (e) => {
          const el = document.activeElement;
          if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) return;
          const map = { '1': 'overview', '2': 'agents', '3': 'traces', '4': 'cost', '5': 'patterns' };
          if (map[e.key]) { setView(map[e.key]); setSelectedTrace(null); }
          if (e.key === 'Escape' && selectedTrace) setSelectedTrace(null);
        };
        document.addEventListener('keydown', handler);
        return () => document.removeEventListener('keydown', handler);
      }, [selectedTrace]);

      const openTrace = useCallback((id) => setSelectedTrace(id), []);
      const closeTrace = useCallback(() => setSelectedTrace(null), []);

      return (
        <div className="min-h-screen">
          <Header wsConnected={wsConnected} lastRefresh={lastRefresh} />
          {!selectedTrace && <NavTabs view={view} setView={(v) => { setView(v); setSelectedTrace(null); }} />}
          <main className="max-w-[1600px] mx-auto px-6 py-6">
            {selectedTrace ? (
              <TraceDetailView traceId={selectedTrace} onBack={closeTrace} />
            ) : (
              <>
                {view === 'overview' && (
                  <OverviewView
                    stats={stats} agents={agents} events={events}
                    recentTraces={recentTraces} trendData={trendData}
                    networkData={networkData} onOpenTrace={openTrace}
                    trendHours={trendHours} setTrendHours={changeTrendHours}
                  />
                )}
                {view === 'agents' && <AgentsView agents={agents} agentSummary={agentSummary} networkData={networkData} />}
                {view === 'traces' && <TracesView onOpenTrace={openTrace} />}
                {view === 'cost' && <CostView />}
                {view === 'patterns' && <PatternsView />}
              </>
            )}
          </main>

          {/* Footer */}
          <footer className="mt-8 border-t border-white/5">
            <div className="max-w-[1600px] mx-auto px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-3">
              <div className="flex items-center gap-2 text-xs text-slate-500">
                <div className="w-5 h-5 rounded bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center flex-shrink-0">
                  <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                  </svg>
                </div>
                <span className="font-medium text-slate-400">FlowLens v2.0.0</span>
                <span className="text-slate-700">|</span>
                <span>Agent Observability Platform</span>
              </div>
